services:
  mongo:
    image: mongo:7
    container_name: profile-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  profile-crud:
    build:
      context: .
      args:
        APP: profile-crud
    container_name: profile-crud
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/profiles
      PROFILE_CRUD_PORT: 3001
    depends_on:
      - mongo
    ports:
      - "3001:3001"

  profile-query:
    build:
      context: .
      args:
        APP: profile-query
    container_name: profile-query
    env_file: .env
    environment:
      PROFILE_QUERY_PORT: 3000
      PROFILE_CRUD_BASE_URL: http://profile-crud:3001
    depends_on:
      - profile-crud
    ports:
      - "3000:3000"

volumes:
  mongo-data:
